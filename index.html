<!DOCTYPE html>
<html>
<head>
  <title>Gas Leak Dashboard</title>

  <style>
    body {
      background: gray;
      color: white;
      text-align: center;
      font-family: Arial;
      transition: 0.5s;
    }

    h1 {
      color: yellow;
    }

    #alert {
      font-size: 30px;
      font-weight: bold;
    }

    #gas {
      font-size: 25px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h1>🔥 LPG Gas Monitoring Dashboard</h1>

<h2>Gas Value: <span id="gas">--</span></h2>

<!-- 🟡 Initial Status -->
<h2 id="alert">Status: Waiting for data...</h2>

<!-- 🔊 Alarm -->
<audio id="alarm" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

<!-- Enable sound -->
<button onclick="enableSound()">Enable Sound</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";


// 🔥 YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCgDcyDvVJkoH_dSFzGzhvqR4vmunjgmTw",
  authDomain: "gasleakagemonitoring-3b7c7.firebaseapp.com",
  databaseURL: "https://gasleakagemonitoring-3b7c7-default-rtdb.firebaseio.com",
  projectId: "gasleakagemonitoring-3b7c7"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 🔥 MUST MATCH ESP32 PATH
const dataRef = ref(db, "GasMonitoring");

let soundEnabled = false;

window.enableSound = function(){
  soundEnabled = true;
  alert("Sound Enabled!");
}

// 🔥 REAL-TIME LISTENER
onValue(dataRef, (snapshot) => {

  if(!snapshot.exists()){
    document.getElementById("alert").innerText = "Status: No Data";
    document.body.style.background = "gray";
    return;
  }

  const data = snapshot.val();

  if(data){

    let gas = data.GasValue;
    document.getElementById("gas").innerText = gas;

    let alarm = document.getElementById("alarm");

    // 🔴 GAS LEAK
    if(gas > 1500){

      document.getElementById("alert").innerText = "⚠️ GAS LEAK DETECTED";
      document.body.style.background = "red";

      if(soundEnabled){
        alarm.play();
      }

    } 
    // 🟢 SAFE
    else {

      document.getElementById("alert").innerText = "SAFE";
      document.body.style.background = "green";

      alarm.pause();
      alarm.currentTime = 0;
    }
  }

});

</script>

</body>
</html>
